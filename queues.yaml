version: 1

qos_aliases:
  ui: userInteractive
  hot: userInitiated
  work: utility
  maintenance: background

processes:
  long:
    subsystem: com.foxy.long.bridge
    units:
      bridge_capture:
        label: com.foxy.long.bridge.capture
        primitive: callback_path
        qos: inherited
        concurrency: 0
        category: bridge

      bridge_sender:
        label: com.foxy.long.bridge.sender
        primitive: dedicated_thread
        qos: hot
        concurrency: 1
        category: bridge

      outbox_journal:
        label: com.foxy.long.bridge.outbox-journal
        primitive: dedicated_thread
        qos: work
        concurrency: 1
        category: bridge

      outbox_drain:
        label: com.foxy.long.bridge.outbox-drain
        primitive: dedicated_thread
        qos: work
        concurrency: 1
        category: bridge

  tape_mcp:
    subsystem: com.foxy.long.tape-mcp
    units:
      mcp_stdio:
        label: com.foxy.long.tape-mcp.stdio
        primitive: dedicated_thread
        qos: inherited
        concurrency: 1
        category: adapter

      engine_rpc:
        label: com.foxy.long.tape-mcp.engine-rpc
        primitive: dedicated_thread
        qos: work
        concurrency: 1
        category: adapter
